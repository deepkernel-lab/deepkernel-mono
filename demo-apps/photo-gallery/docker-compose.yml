version: "3.9"

services:
  backend:
    build:
      context: ./backend
    ports:
      - "8001:8001"
    networks:
      - photogallery

  frontend:
    build:
      context: ./frontend
    environment:
      - VITE_BACKEND_URL=http://localhost:8001
    ports:
      - "3001:3001"
    depends_on:
      - backend
    networks:
      - photogallery

networks:
  photogallery:
    name: photogallery
