server:
  port: 9090

spring:
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

deepkernel:
  feature-version: v1
  agent:
    base-url: http://localhost:8082
  ui:
    origin: "*"
  ws:
    allowed-origins: "*" 
  gemini:
    api-key: ${GEMINI_API_KEY:AIzaSyD7i8RQ7uDvsFhEtRWX_rL8E3WoIrPb_4s}
    model: gemini-pro
  # Anomaly detection configuration
  # mode: LOCAL (in-process only), REMOTE (ml-service only), HYBRID (prefer remote, fallback to local)
  anomaly:
    mode: ${ANOMALY_ENGINE_MODE:HYBRID}
  ml-service:
    url: ${ML_SERVICE_URL:http://localhost:8081}

