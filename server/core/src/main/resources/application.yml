server:
  port: 9090

spring:
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

deepkernel:
  feature-version: v1
  agent:
    base-url: http://localhost:8082
  ui:
    origin: http://localhost:5173
  ws:
    allowed-origins: http://localhost:5173,http://localhost:3000,http://13.204.239.189:5173
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: gemini-pro
  # Anomaly detection configuration
  # mode: LOCAL (in-process only), REMOTE (ml-service only), HYBRID (prefer remote, fallback to local)
  anomaly:
    mode: ${ANOMALY_ENGINE_MODE:HYBRID}
  ml-service:
    url: ${ML_SERVICE_URL:http://localhost:8081}

